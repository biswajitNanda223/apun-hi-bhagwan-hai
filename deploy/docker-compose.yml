services:
  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    env_file:
      - ../.env
    environment:
      DATABASE_URL: file:/app/apps/api/prisma/prod.db
    ports:
      - '3000:3000'
      - '50051:50051'
    volumes:
      - api-data:/app/apps/api/prisma

volumes:
  api-data:

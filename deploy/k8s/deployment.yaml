apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastify-workspace-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fastify-workspace-api
  template:
    metadata:
      labels:
        app: fastify-workspace-api
    spec:
      containers:
        - name: api
          image: fastify-workspace-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
            - containerPort: 50051
              name: grpc
          envFrom:
            - configMapRef:
                name: fastify-workspace-api
            - secretRef:
                name: fastify-workspace-api-secret
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
